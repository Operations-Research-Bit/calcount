<!-- diet-insights.html-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker - Stripe Pro</title>
    <script src="https://cloudflare.com"></script>
    
    <!-- 1. Load the Stripe JS Library -->
    <script async src="https://stripe.com"></script>

    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; padding: 20px; }
        .app-card { background: #deb887; padding: 25px; border-radius: 12px; border: 5px solid #8b4513; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 100%; max-width: 450px; color: #000; }
        .premium-box { background: rgba(255, 255, 255, 0.4); border: 2px dashed #8b4513; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .locked { display: none; }
        .chart-container { margin: 15px 0; height: 220px; background: rgba(255, 255, 255, 0.2); border-radius: 8px; padding: 10px; }
        input, .add-btn { width: 100%; padding: 12px; margin: 5px 0; border-radius: 5px; border: 1px solid #8b4513; box-sizing: border-box; }
        .add-btn { background: #e67e22; color: white; font-weight: bold; cursor: pointer; border: none; }
        .export-btn { background: #27ae60; color: white; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Calorie Tracker <span style="font-size: 0.6em; background: #000; color: #deb887; padding: 2px 6px; border-radius: 4px;">PRO</span></h2>
    
    <div class="chart-container"><canvas id="caloriesChart"></canvas></div>

    <input type="text" id="food" placeholder="Food item">
    <input type="number" id="cals" placeholder="Calories">
    <button class="add-btn" onclick="addEntry()">Add Entry</button>

    <div class="premium-box">
        <div id="paywall">
            <p><strong>Unlock CSV Export</strong></p>
            
            <!-- 2. REPLACE WITH YOUR STRIPE BUY BUTTON CODE -->
            <stripe-buy-button
              buy-button-id="YOUR_BUY_BUTTON_ID"
              publishable-key="YOUR_PUBLISHABLE_KEY"
            >
            </stripe-buy-button>
            
            <!-- Temporary Unlock for Testing -->
            <p style="font-size: 0.7rem; cursor: pointer;" onclick="unlockPremium()">[ Dev: Test Unlock ]</p>
        </div>

        <div id="premium-features" class="locked">
            <button class="add-btn export-btn" onclick="exportData()">Download CSV</button>
        </div>
    </div>
</div>

<script>
    let foods = [], calories = [], myChart, isPremium = false;

    // After payment, Stripe usually redirects to a Success URL.
    // For a single HTML file, you can check the URL for a "success=true" param.
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('payment_success') === 'true') {
            unlockPremium();
        }
        initChart();
    };

    function unlockPremium() {
        isPremium = true;
        document.getElementById('paywall').style.display = 'none';
        document.getElementById('premium-features').classList.remove('locked');
    }

    function exportData() {
        if (!isPremium) return;
        let csvContent = "data:text/csv;charset=utf-8,Food,Calories\n" + 
            foods.map((f, i) => `${f},${calories[i]}`).join("\n");
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "calorie_data.csv");
        link.click();
    }

    function initChart() {
        const ctx = document.getElementById('caloriesChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Add Food'], datasets: [{ data:, backgroundColor: ['#f0f0f0'] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function addEntry() {
        const food = document.getElementById('food').value;
        const cal = parseInt(document.getElementById('cals').value);
        if (food && !isNaN(cal)) {
            foods.push(food); calories.push(cal);
            myChart.data.labels = [...foods, 'Remaining'];
            myChart.data.datasets.data = [...calories, 0];
            myChart.update();
        }
    }
</script>
</body>
</html>
